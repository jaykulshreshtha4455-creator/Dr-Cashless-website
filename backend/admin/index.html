<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Dr. Cashless</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-brand-icon {
      width: 44px; height: 44px;
      background: #F25C08;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .login-brand-name { font-size: 18px; font-weight: 700; }
    .login-brand-sub  { font-size: 12px; color: rgba(255,255,255,0.4); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      font-size: 14px; color: #fff; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #F25C08; }
    .btn {
      width: 100%; padding: 13px;
      background: #F25C08; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.88; }
    .error {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ef4444;
      margin-bottom: 16px;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon"><i class="fas fa-heart-pulse"></i></div>
      <div>
        <div class="login-brand-name">Dr. Cashless</div>
        <div class="login-brand-sub">Admin Portal</div>
      </div>
    </div>
    <h1>Welcome back</h1>
    <p class="login-sub">Sign in to manage hospitals, appointments and claims.</p>
    <div class="error" id="errMsg"></div>
    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('dc_admin_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      err.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('dc_admin_token', data.token);
        localStorage.setItem('dc_admin_user', data.username);
        window.location.href = 'dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('show');
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
